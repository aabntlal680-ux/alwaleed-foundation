<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التبرعات - مؤسسة الوليد للإنسانية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root {
            --primary-green: #008444;
            --accent-purple: #7e57c2;
            --bg-light: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-light); overflow-x: hidden; }

        /* --- الهيدر (كما في الكود السابق) --- */
        header {
            position: absolute;
            top: 0; width: 100%; padding: 10px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img { height: 45px; width: auto; filter: brightness(1.2); }
        nav ul { display: flex; list-style: none; color: white; gap: 15px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        nav ul li a:hover { color: var(--primary-green); }

        /* --- قسم الترحيب الخاص بصفحة من نحن --- */
        .about-hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('images/ad.png');
            background-size: cover;
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        
        .about-hero h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* --- حاوية الجدول المتجاوب --- */
        .table-section {
            padding: 40px 5%;
            margin-top: -60px; /* لدمج الصندوق مع الهيرو */
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-green); margin-bottom: 25px; font-weight: 700; }

        /* إعدادات التجاوب ومنع اختفاء النصوص */
        .table-wrapper {
            width: 100%;
            overflow-x: hidden; 
        }

        /* تنسيق الجدول الأساسي */
        table {
            width: 100%;
            border-collapse: collapse; /* لضمان أن الخطوط مدمجة وليست مزدوجة */
            table-layout: fixed;
            border: 1px solid #ccc; /* إطار خارجي للجدول بالكامل */
        }

/* تنسيق رؤوس الجدول (الفواصل العمودية في الأعلى) */
        th {
            background-color: var(--primary-green);
            color: white;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3); /* فواصل عمودية وأفقية خفيفة في الهيدر */
        }

/* تنسيق الخلايا (الفواصل الرأسية والأفقية للبيانات) */
        td {
            padding: 12px 10px;
            text-align: center;
    /* إضافة فواصل عمودية وأفقية */
            border: 1px solid #ddd; 
    
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            font-size: 0.85rem;
            color: #444;
        }

/* لجعل الفواصل تبدو أجمل، نلون السطور الزوجية */
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* استهداف شاشات الهاتف */
        @media screen and (max-width: 600px) {
            .about-hero h1 { font-size: 1.8rem; }
            th, td { padding: 10px 4px; font-size: 0.75rem; }
            .container { padding: 12px; }

            /* توزيع عرض الأعمدة لضمان ظهور كل شيء */
            th:nth-child(1) { width: 35%; } /* الاسم */
            th:nth-child(2) { width: 15%; } /* الجنسية */
            th:nth-child(3) { width: 15%; } /* التبرع */
            th:nth-child(4) { width: 15%; } /* العملة */
            th:nth-child(5) { width: 20%; } /* التاريخ */
        }
        
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.0s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* سرعة ونعومة الحركة */
        }
        
        .text-1 { transition-delay: 0s; }    /* يظهر فوراً */
        .text-2 { transition-delay: 0.5s; }  /* ينتظر نصف ثانية ثم يظهر */
        .text-3 { transition-delay: 1s; }    /* ينتظر ثانية كاملة ثم يظهر */


/* الحالة النشطة: ظهور العنصر وعودته لمكانه الأصلي */
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
    </style>
</head>
<body>

    <header>
        <div class="logo-container reveal">
            <img src="images/ad.png" alt="logo">
        </div>
        <nav>
            <ul>
                <li><a href="/index.html">الرئيسية</a></li>
                <li><a href="#" style="color: var(--primary-green);">التبرعات</a></li>
                <li><a href="view-us.html">المساعدات</a></li>
                <li><i class="fas fa-bars" style="color: white; cursor: pointer;"></i></li>
            </ul>
        </nav>
    </header>

    <section class="about-hero reveal">
        <h1>سجل التبرعات</h1>
    </section>
    
    <div style="height: 100px;"></div>
    
    <section class="table-section reveal">
        <div class="container reveal">
            <h2>قائمة التبرعات الواردة</h2>
            <div class="table-wrapper reveal">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الجنسية</th>
                            <th>المبلغ</th>
                            <th>العملة</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="casesDisplayContainer">
                        </tbody>
                </table>
                <div id="loader" style="text-align: center; padding: 20px; color: #888;">جاري تحميل البيانات...</div>
            </div>
        </div>
    </section>

<div style="height: 30px;"></div> 
    <footer>
        <div style="text-align: center;">
            <p>تواصل معنا واتساب: <a href="https://wa.me/966567232680" style="color: var(--primary-green);"><i class="fab fa-whatsapp" style="color: red;"></i>  واتساب المؤسسة  </a></p>
            <div style="height: 30px;"></div>
            <p>تواصل معنا عبر البريد: <a href="mailto:aabntlal680@gmail.com" style="color: var(--primary-green);"><i class="fab fa-at" style="color: red;"></i> عنوان البريد </a></p>
            <div style="height: 30px;"></div>
            <p style="margin-top: 10px; font-size: 0.8rem; color: #777;">جميع الحقوق محفوظة-مؤسسة الوليد الإنسانية لعام @2026</p>
            <div style="height: 30px;"></div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1-J4dSTmxUnz5d7dVq9XWrRHf_Lr511M",
            authDomain: "alwaleed-3a813.firebaseapp.com",
            projectId: "alwaleed-3a813",
            storageBucket: "alwaleed-3a813.firebasestorage.app",
            messagingSenderId: "680698906569",
            appId: "1:680698906569:web:154df6466c1c89d67f4a18",
            measurementId: "G-0L0K6Y3P1S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const container = document.getElementById('casesDisplayContainer');
        const loader = document.getElementById('loader');
        
        // استعلام كولكشن donations
        const q = query(collection(db, "donations"), orderBy("date", "desc"));

        onSnapshot(q, (querySnapshot) => {
            container.innerHTML = ""; 
            loader.style.display = "none";

            if (querySnapshot.empty) {
                container.innerHTML = `<tr><td colspan="5">لا توجد سجلات تبرع حالياً</td></tr>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = document.createElement('tr');
                
                // معالجة التاريخ ليكون مختصراً
                const displayDate = data.date ? new Date(data.date).toLocaleDateString('en-GB') : "-";

                row.innerHTML = `
                    <td><strong>${data.name || 'بدون اسم'}</strong></td>
                    <td>${data.nationality || 'غير محدد'}</td>
                    <td style="color: var(--primary-green); font-weight: bold;">${data.amount || 0}</td>
                    <td>${data.currency || '---'}</td>
                    <td style="color: #888; font-size: 0.8em;">${displayDate}</td>
                `;
                
                container.appendChild(row);
            });
        }, (error) => {
            console.error("خطأ في جلب البيانات: ", error);
            loader.innerText = "حدث خطأ أثناء جلب البيانات.";
        });
    </script>
    
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const observerOptions = {
        threshold: 0.1 // تفعيل الحركة عند ظهور 10% من العنصر
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add("active");
            } else {
                // حذف الكلاس عند الخروج لجعل الحركة تتكرر دوماً
                entry.target.classList.remove("active");
            }
        });
    }, observerOptions);

    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
    });
    </script>
</body>
</html>
