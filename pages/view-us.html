<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة الوليد الإنسانية | عرض الطلبات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=400;700&display=swap');

        :root {
            --primary-green: #008444;
            --accent-purple: #7e57c2;
            --whatsapp-color: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; overflow-x: hidden; }

        header {
            position: absolute;
            top: 0; width: 100%; padding: 10px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img { height: 45px; width: auto; filter: brightness(1.2); }
        nav ul { display: flex; list-style: none; color: white; gap: 15px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        .about-hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/ad.png');
            background-size: cover;
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        .table-section {
            padding: 40px 5%;
            margin-top: -50px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-green); margin-bottom: 25px; font-weight: 700; }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ccc;
        }

        th {
            background-color: var(--primary-green);
            color: white;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        td {
            padding: 12px 10px;
            text-align: center;
            border: 1px solid #ddd; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            font-size: 0.8rem;
            color: #444;
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        .status-badge {
            background: #e1f5fe;
            color: #0288d1;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .loading { text-align: center; padding: 40px; color: #7f8c8d; font-weight: bold; }
        
        .main-footer { padding: 40px 5%; background: #fff; margin-top: 40px; border-top: 1px solid #eee; }
        .footer-container { max-width: 1100px; margin: 0 auto; text-align: center; }
        .contact-links, .links-grid { display: flex; justify-content: center; gap: 30px; margin-top: 15px; flex-wrap: wrap; }
        .contact-item, .links-grid a { color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .footer-divider { width: 100%; height: 1px; background: #eee; margin: 20px 0; }
        .footer-bottom { color: #94a3b8; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/ad.png" alt="logo">
        </div>
        <nav>
            <ul>
                <li><a href="/index.html">الرئيسية</a></li>
                <li><a href="#" style="color: var(--primary-green);">المساعدات</a></li>
                <li><a href="cases.html">التبرعات</a></li>
            </ul>
        </nav>
    </header>

    <section class="about-hero">
        <h1>سجل الطلبات المستلمة</h1>
    </section>
    
    <section class="table-section">
        <div class="container">
            <h2>طلبات المساعدة الموثقة</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الموقع</th>
                            <th>النوع</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div id="loader" class="loading">جاري التحديث وجلب البيانات...</div>
            </div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="contact-links">
                <a href="mailto:support@alwaleed.com" class="contact-item"><i class="fas fa-envelope"></i> البريد الإلكتروني</a>
                <a href="https://wa.me/your-number" class="contact-item"><i class="fab fa-whatsapp"></i> واتساب الدعم</a>
            </div>
            <div class="links-grid">
                <a href="privacy-policy.html">سياسة الخصوصية</a>
                <a href="terms.html">شروط الاستخدام</a>
            </div>
            <div class="footer-divider"></div>
            <div class="footer-bottom">
                <p>جميع حقوق النشر والطبع محفوظة لمؤسسة الوليد &copy; 2026</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // تأكد من وضع قيم مشروعك هنا بشكل صحيح
        const firebaseConfig = {
            apiKey: "AIzaSyC1-J4dSTmxUnz5d7dvq9XWrRHf_Lr511M",
            authDomain: "alwaleed-3a813.firebaseapp.com",
            projectId: "alwaleed-3a813",
            storageBucket: "alwaleed-3a813.firebasestorage.app",
            messagingSenderId: "680698906569",
            appId: "1:680698906569:web:154df6466c1c89d67f4a18"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tableBody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');

        async function fetchOrders() {
            try {
                // استخدام getDocs المباشر لضمان عدم التعليق على الآيباد بسبب الشبكة
                const q = query(collection(db, "us"), orderBy("date", "desc"));
                const snapshot = await getDocs(q);
                
                tableBody.innerHTML = "";
                loader.style.display = "none";

                if (snapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="padding:20px; color:#999;">لا توجد طلبات مسجلة حالياً في النظام.</td></tr>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    let dateStr = "---";
                    
                    if (item.date) {
                        // حل مشكلة اختلاف نوع التاريخ وسرعة معالجته
                        const rawDate = item.date.seconds ? new Date(item.date.seconds * 1000) : new Date(item.date);
                        dateStr = isNaN(rawDate) ? "---" : rawDate.toLocaleDateString('ar-YE');
                    }

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${item.name || '---'}</strong></td>
                        <td><span class="status-badge">${item.location || '---'}</span></td>
                        <td>${item.type || '---'}</td>
                        <td style="color:#888;">${dateStr}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Firebase Error:", error);
                loader.style.color = "red";
                loader.innerHTML = `حدث خطأ أثناء جلب البيانات.<br><small style="color:#555; font-size:0.7rem;">${error.message}</small>`;
            }
        }

        // انطلاق الدالة فوراً عند فتح الصفحة
        fetchOrders();
    </script>
</body>
</html>
