<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مؤسسة الوليد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .hidden { display: none !important; }
        #adminMessagesArea::-webkit-scrollbar { width: 6px; }
        #adminMessagesArea::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }
        
        @keyframes pulse-blue {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            animation: pulse-blue 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-white">

    <div class="container mx-auto p-4">
        <header class="flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-lg shadow-xl border-b-2 border-blue-500">
            <h1 class="text-2xl font-bold text-blue-400">نظام الإدارة - مؤسسة الوليد</h1>
            <div id="statusIndicator" class="text-xs bg-green-900/30 text-green-400 px-3 py-1 rounded-full border border-green-500/50">لوحة التحكم نشطة</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-1 bg-slate-800 rounded-lg p-4 h-[750px] flex flex-col shadow-lg border border-slate-700">
                <h2 class="font-bold mb-4 border-b border-slate-700 pb-2 flex justify-between items-center">
                    <span>الطلبات الواردة</span>
                    <span id="ticketCount" class="bg-blue-600 text-xs px-2 py-1 rounded-full">0</span>
                </h2>
                <div id="allTicketsList" class="space-y-2 overflow-y-auto flex-1 pr-1 text-right"></div>
            </div>
            
            <div class="md:col-span-3 bg-slate-800 rounded-lg flex flex-col h-[750px] shadow-lg border border-slate-700">
                <div id="adminChatHeader" class="p-4 border-b border-slate-700 bg-slate-900/50 rounded-t-lg">
                    <h3 id="chatHeaderTitle" class="font-bold text-slate-500 text-center">اختر محادثة لبدء الرد</h3>
                </div>
                <div id="adminMessagesArea" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-900/20 flex flex-col"></div>
                
                <form id="adminReplyForm" class="p-4 border-t border-slate-700 bg-slate-800 rounded-b-lg" onsubmit="event.preventDefault(); sendAdminReply();">
                    <div class="flex items-center gap-3">
                        <input type="text" id="adminReplyInput" placeholder="اكتب ردك هنا..." class="flex-1 bg-slate-900 border border-slate-700 rounded-full px-5 py-3 outline-none text-white text-sm focus:border-blue-500 transition" disabled>
                        <button type="submit" id="sendBtn" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-full transition disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://nfugvnjbpwhpzttfrtbg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_2AyTT9Q94iccKqyIGlqH0Q_IGPPioI1'; 
    const supabaseAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let activeTicketId = null;
    const adminId = '07faacef-7438-4b39-a4f7-2240563a77ac';
    let allTickets = [];

    async function init() {
        await fetchAllTickets();
        setupRealtime();
    }

    async function fetchAllTickets() {
        const { data, error } = await supabaseAdmin
            .from('tickets')
            .select('*')
            .order('updated_at', { ascending: false });

        if (!error && data) {
            allTickets = data;
            renderTickets();
        }
    }

    function renderTickets() {
        const container = document.getElementById('allTicketsList');
        document.getElementById('ticketCount').innerText = allTickets.length;
        container.innerHTML = '';
        
        allTickets.forEach(ticket => {
            const isActive = activeTicketId === ticket.id;
            const hasUnread = ticket.unread_count > 0;

            const div = document.createElement('div');
            div.className = `p-4 rounded-xl cursor-pointer border transition-all duration-300 mb-2 ${isActive ? 'bg-blue-600/20 border-blue-500 shadow-lg' : 'bg-slate-700/50 border-slate-600 hover:bg-slate-700'}`;
            
            div.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="text-sm font-bold flex items-center">
                        ${hasUnread ? '<span class="online-dot"></span>' : ''}
                        ${ticket.subject || 'بدون عنوان'}
                    </span>
                    <span class="text-[10px] text-slate-500">${new Date(ticket.updated_at).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            
            div.onclick = () => loadMessages(ticket.id, ticket.subject);
            container.appendChild(div);
        });
    }

    async function loadMessages(ticketId, subject) {
        activeTicketId = ticketId;
        document.getElementById('adminReplyInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('chatHeaderTitle').innerText = subject;
        document.getElementById('chatHeaderTitle').classList.add('text-blue-400');

        // تصغير العداد في القاعدة عند الفتح
        await supabaseAdmin.from('tickets').update({ unread_count: 0 }).eq('id', ticketId);

        const { data: messages } = await supabaseAdmin.from('messages')
            .select('*').eq('ticket_id', ticketId).order('created_at', { ascending: true });
            
        const area = document.getElementById('adminMessagesArea');
        area.innerHTML = '';
        messages?.forEach(msg => {
            const isMe = msg.sender_id === adminId;
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[80%] p-3 rounded-2xl mb-2 flex flex-col ${isMe ? 'bg-blue-600 self-end rounded-tr-none' : 'bg-slate-700 self-start rounded-tl-none'}`;
            msgDiv.innerHTML = `<p class="text-sm">${msg.message_text}</p>`;
            area.appendChild(msgDiv);
        });
        area.scrollTop = area.scrollHeight;
        
        // تحديث الحالة محلياً
        const tIdx = allTickets.findIndex(t => t.id === ticketId);
        if(tIdx !== -1) allTickets[tIdx].unread_count = 0;
        renderTickets();
    }

    // الدالة المسؤولة عن الإرسال والقفز للأعلى
    async function sendAdminReply() {
        const input = document.getElementById('adminReplyInput');
        const text = input.value.trim();
        if (!text || !activeTicketId) return;

        try {
            // 1. إدخال الرسالة
            const { error: msgError } = await supabaseAdmin
                .from('messages')
                .insert([{
                    ticket_id: activeTicketId,
                    sender_id: adminId,
                    message_text: text,
                    message_type: 'text'
                }]);

            if (msgError) throw msgError;

            // 2. تحديث وقت التذكرة (لجعلها تقفز للأعلى)
            const { error: ticketError } = await supabaseAdmin
                .from('tickets')
                .update({ 
                    updated_at: new Date().toISOString()
                })
                .eq('id', activeTicketId);

            if (ticketError) throw ticketError;

            // 3. مسح الحقل وإعادة الجلب
            input.value = '';
            await loadMessages(activeTicketId, document.getElementById('chatHeaderTitle').innerText);
            await fetchAllTickets(); 

        } catch (err) {
            console.error("خطأ:", err.message);
        }
    }

    function setupRealtime() {
        supabaseAdmin.channel('admin_sync')
            .on('postgres_changes', { event: '*', table: 'messages' }, async (payload) => {
                if (payload.eventType === 'INSERT' && payload.new.sender_id !== adminId) {
                    // عند وصول رسالة من العميل: تحديث وقت التذكرة والعداد
                    const { data: currentTicket } = await supabaseAdmin.from('tickets').select('unread_count').eq('id', payload.new.ticket_id).single();
                    const newCount = (currentTicket?.unread_count || 0) + 1;
                    
                    await supabaseAdmin.from('tickets').update({ 
                        unread_count: newCount, 
                        updated_at: new Date().toISOString() 
                    }).eq('id', payload.new.ticket_id);
                }
                
                // تحديث الرسائل إذا كانت التذكرة مفتوحة
                if (activeTicketId && payload.new.ticket_id === activeTicketId) {
                    const area = document.getElementById('adminMessagesArea');
                    const isAtBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 100;
                    
                    // إعادة تحميل الرسائل فقط للتذكرة النشطة
                    const { data: messages } = await supabaseAdmin.from('messages').select('*').eq('ticket_id', activeTicketId).order('created_at', { ascending: true });
                    area.innerHTML = '';
                    messages?.forEach(msg => {
                        const isMe = msg.sender_id === adminId;
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `max-w-[80%] p-3 rounded-2xl mb-2 flex flex-col ${isMe ? 'bg-blue-600 self-end rounded-tr-none' : 'bg-slate-700 self-start rounded-tl-none'}`;
                        msgDiv.innerHTML = `<p class="text-sm">${msg.message_text}</p>`;
                        area.appendChild(msgDiv);
                    });
                    if (isAtBottom) area.scrollTop = area.scrollHeight;
                }
                fetchAllTickets();
            })
            .on('postgres_changes', { event: '*', table: 'tickets' }, () => fetchAllTickets())
            .subscribe();
    }

    init();
</script>
</body>
</html>
