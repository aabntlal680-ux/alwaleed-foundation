<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة الوليد الإنسانية | عرض الطلبات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root {
            --primary-green: #008444;
            --accent-purple: #7e57c2;
            --whatsapp-color: #25D366;
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; overflow-x: hidden; }

        /* --- الهيدر (المطلوب إظهاره) --- */
        header {
            position: absolute;
            top: 0; width: 100%; padding: 10px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container img { height: 45px; width: auto; filter: brightness(1.2); }
        nav ul { display: flex; list-style: none; color: white; gap: 15px; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; font-size: 0.8rem; transition: 0.3s; }
        nav ul li a:hover { color: var(--primary-green); }

        /* --- قسم الهيرو (المطلوب إظهاره) --- */
        .about-hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/ad.png');
            background-size: cover;
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        /* --- حاوية الجدول المتجاوب --- */
        .table-section {
            padding: 40px 5%;
            margin-top: -50px; /* لدمج الصندوق مع الهيرو قليلاً */
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-green); margin-bottom: 25px; font-weight: 700; }

        /* الحل الجذري لاختفاء الجدول في الهاتف */
        .table-wrapper {
            width: 100%;
            overflow-x: hidden; /* منع التمرير الجانبي */
        }

        /* تنسيق الجدول الأساسي */
        table {
            width: 100%;
            border-collapse: collapse; /* لضمان أن الخطوط مدمجة وليست مزدوجة */
            table-layout: fixed;
            border: 1px solid #ccc; /* إطار خارجي للجدول بالكامل */
        }

/* تنسيق رؤوس الجدول (الفواصل العمودية في الأعلى) */
        th {
            background-color: var(--primary-green);
            color: white;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3); /* فواصل عمودية وأفقية خفيفة في الهيدر */
        }

/* تنسيق الخلايا (الفواصل الرأسية والأفقية للبيانات) */
        td {
            padding: 12px 10px;
            text-align: center;
    /* إضافة فواصل عمودية وأفقية */
            border: 1px solid #ddd; 
    
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
            font-size: 0.7rem;
            color: #444;
        }

/* لجعل الفواصل تبدو أجمل، نلون السطور الزوجية */
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }


        .status-badge {
            background: #e1f5fe;
            color: #0288d1;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.7rem;
        }

        .loading { text-align: center; padding: 40px; color: #7f8c8d; }

        /* استهداف شاشات الهاتف الصغير جداً */
        @media screen and (max-width: 600px) {
            .about-hero h1 { font-size: 1.2rem; }
            th, td { padding: 10px 5px; font-size: 0.75rem; }
            .container { padding: 15px; }
            
            /* تحديد عرض الأعمدة مسبقاً لمنع التزاحم */
            th:nth-child(1) { width: 40%; } /* الاسم */
            th:nth-child(2) { width: 20%; } /* الموقع */
            th:nth-child(3) { width: 20%; } /* النوع */
            th:nth-child(4) { width: 20%; } /* التاريخ */
        }
        
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.0s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* سرعة ونعومة الحركة */
        }
        
        .text-1 { transition-delay: 0s; }    /* يظهر فوراً */
        .text-2 { transition-delay: 0.5s; }  /* ينتظر نصف ثانية ثم يظهر */
        .text-3 { transition-delay: 1s; }    /* ينتظر ثانية كاملة ثم يظهر */


/* الحالة النشطة: ظهور العنصر وعودته لمكانه الأصلي */
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
    </style>
</head>
<body>

    <header>
        <div class="logo-container reveal">
            <img src="images/ad.png" alt="logo">
        </div>
        <nav>
            <ul>
                <li><a href="/index.html">الرئيسية</a></li>
                <li><a href="#" style="color: var(--primary-green);">المساعدات</a></li>
                <li><a href="cases.html">التبرعات</a></li>
                <li><i class="fas fa-bars" style="color: white; cursor: pointer;"></i></li>
            </ul>
        </nav>
    </header>

    <section class="about-hero reveal">
        <h1>سجل الطلبات المستلمة</h1>
    </section>
    <div style="height: 100px;"></div>
    
    <section class="table-section reveal">
        <div class="container reveal">
            <h2>طلبات المساعدة الموثقة</h2>
            <div class="table-wrapper reveal">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الموقع</th>
                            <th>النوع</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
                <div id="loader" class="loading">جاري التحديث...</div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1-J4dSTmxUnz5d7dvq9XWrRHf_Lr511M",
            authDomain: "alwaleed-3a813.firebaseapp.com",
            projectId: "alwaleed-3a813",
            storageBucket: "alwaleed-3a813.firebasestorage.app",
            messagingSenderId: "680698906569",
            appId: "1:680698906569:web:154df6466c1c89d67f4a18"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tableBody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');

        const q = query(collection(db, "us"), orderBy("date", "desc"));

        onSnapshot(q, (snapshot) => {
            tableBody.innerHTML = "";
            loader.style.display = "none";

            if (snapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="4">لا توجد طلبات حالياً</td></tr>`;
                return;
            }

            snapshot.forEach((doc) => {
                const item = doc.data();
                const dateStr = item.date ? new Date(item.date).toLocaleDateString('ar-YE') : "---";

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${item.name || ''}</strong></td>
                    <td><span class="status-badge">${item.location || ''}</span></td>
                    <td>${item.type || ''}</td>
                    <td style="color:#888;">${dateStr}</td>
                `;
                tableBody.appendChild(row);
            });
        });
    </script>
    
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const observerOptions = {
        threshold: 0.1 // تفعيل الحركة عند ظهور 10% من العنصر
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add("active");
            } else {
                // حذف الكلاس عند الخروج لجعل الحركة تتكرر دوماً
                entry.target.classList.remove("active");
            }
        });
    }, observerOptions);

    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
    });
    </script>
</body>
</html>
